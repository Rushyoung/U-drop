<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>WASM 加密工具测试</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        .result-item { margin-bottom: 10px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 120px; }
        .value { font-family: monospace; color: #d14; word-break: break-all; }
        .time { font-size: 0.8em; color: #888; margin-left: 10px; }
        #output { white-space: pre-wrap; background: #333; color: #eee; padding: 10px; border-radius: 4px; font-size: 12px; height: 150px; overflow-y: auto; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <h1>WASM MD5 & SHA256 加密测试</h1>

    <div class="card">
        <p>
            <label>选择文件：<input id="fileInput" type="file" /></label>
        </p>
        <p id="fileInfo">文件大小: -</p>
        <button id="calcBtn" disabled>开始全量计算</button>
        <button id="fastCalcBtn" disabled>快速 MD5 计算 (头中尾)</button>
    </div>

    <h3>计算结果</h3>
    <div id="results" class="card">
        <div class="result-item"><span class="label">全量 MD5:</span><span id="res-md5" class="value">-</span><span id="time-md5" class="time"></span></div>
        <div class="result-item"><span class="label">全量 SHA256:</span><span id="res-sha256" class="value">-</span><span id="time-sha256" class="time"></span></div>
        <div class="result-item"><span class="label">全量 BLAKE3:</span><span id="res-blake3" class="value">-</span><span id="time-blake3" class="time"></span></div>
        <div class="result-item"><span class="label">快速 MD5:</span><span id="res-fast-md5" class="value">-</span><span id="time-fast-md5" class="time"></span></div>
    </div>

    <h3>日志输出</h3>
    <div id="output">等待模块加载...</div>

    <script src="/static/md5.js"></script>

    <script>
        const outputEl = document.getElementById('output');
        const resMd5 = document.getElementById('res-md5');
        const resSha256 = document.getElementById('res-sha256');
        const resBlake3 = document.getElementById('res-blake3');
        const resFastMd5 = document.getElementById('res-fast-md5');
        const fileInfo = document.getElementById('fileInfo');

        function log(msg) {
            const now = new Date().toLocaleTimeString();
            outputEl.textContent += `[${now}] ${msg}\n`;
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        let wasm;
        MD5Module({ locateFile: (path) => `/static/${path}` }).then(Module => {
            wasm = Module;
            
            // 初始尝试建立视图
            try {
                ensureWasmMemory();
            } catch(e) {
                log('内存视图初始化警告: ' + e.message);
            }

            document.getElementById('calcBtn').disabled = false;
            document.getElementById('fastCalcBtn').disabled = false;
            log('WASM 模块加载成功。可用接口: ' + Object.keys(wasm).filter(k => k.startsWith('_')).join(', '));
        }).catch(err => {
            log('加载失败: ' + err);
        });

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 增强型内存视图嗅探（支持多视图）
        function ensureWasmMemory() {
            if (!wasm) return;

            let currentBuffer = null;
            if (wasm.HEAPU8) currentBuffer = wasm.HEAPU8.buffer;
            else if (wasm.memory) currentBuffer = wasm.memory.buffer;
            else if (wasm.wasmMemory) currentBuffer = wasm.wasmMemory.buffer;
            else if (wasm.buffer) currentBuffer = wasm.buffer;
            else if (wasm.asm && wasm.asm.memory) currentBuffer = wasm.asm.memory.buffer;

            if (!currentBuffer) {
                // 最后的手段：遍历寻找任何视图并提取 buffer
                for (let key in wasm) {
                    if (wasm[key] && wasm[key].buffer instanceof ArrayBuffer && wasm[key].byteLength > 0) {
                        currentBuffer = wasm[key].buffer;
                        break;
                    }
                }
            }

            if (!currentBuffer) {
                throw new Error("无法定位 WASM 内存缓冲区。请尝试在编译指令中添加 -s EXPORTED_RUNTIME_METHODS='[\"HEAPU8\",\"HEAPU32\"]'");
            }

            // 同步所有需要的视图
            if (!wasm.HEAPU8 || wasm.HEAPU8.buffer !== currentBuffer) {
                wasm.HEAPU8 = new Uint8Array(currentBuffer);
            }
            if (!wasm.HEAPU32 || wasm.HEAPU32.buffer !== currentBuffer) {
                wasm.HEAPU32 = new Uint32Array(currentBuffer);
            }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) fileInfo.textContent = `文件大小: ${formatSize(file.size)} (${file.size.toLocaleString()} 字节)`;
        };

        async function processFileStream(file, type) {
            const isSha256 = type === 'SHA256';
            const isBlake3 = type === 'BLAKE3';
            const chunkSize = 1024 * 1024; // 1MB chunk
            const totalSize = file.size;
            
            ensureWasmMemory();

            // 分配 WASM 内存
            // BLAKE3_CTX 较大，分配 1024 字节确保安全
            const ctxPtr = wasm._malloc(1024);
            const dataPtr = wasm._malloc(chunkSize);
            const digestSize = (isSha256 || isBlake3) ? 32 : 16;
            const digestPtr = wasm._malloc(digestSize);

            try {
                if (isSha256) wasm._SHA256_Init_Ex(ctxPtr);
                else if (isBlake3) wasm._BLAKE3_Init_Ex(ctxPtr);
                else wasm._MD5_Init_Ex(ctxPtr);

                let offset = 0;
                while (offset < totalSize) {
                    const end = Math.min(offset + chunkSize, totalSize);
                    const buf = await file.slice(offset, end).arrayBuffer();
                    const uint8 = new Uint8Array(buf);
                    
                    ensureWasmMemory();
                    wasm.HEAPU8.set(uint8, dataPtr);
                    
                    if (isSha256) wasm._SHA256_Update_Ex(ctxPtr, dataPtr, uint8.length);
                    else if (isBlake3) wasm._BLAKE3_Update_Ex(ctxPtr, dataPtr, uint8.length);
                    else wasm._MD5_Update_Ex(ctxPtr, dataPtr, uint8.length);
                    
                    offset = end;
                }

                if (isSha256) wasm._SHA256_Final_Ex(digestPtr, ctxPtr);
                else if (isBlake3) wasm._BLAKE3_Final_Ex(digestPtr, ctxPtr);
                else wasm._MD5_Final_Ex(digestPtr, ctxPtr);

                const digest = new Uint8Array(wasm.HEAPU8.buffer, digestPtr, digestSize);
                return Array.from(digest).map(b => b.toString(16).padStart(2, '0')).join('');
            } finally {
                wasm._free(ctxPtr);
                wasm._free(dataPtr);
                wasm._free(digestPtr);
            }
        }

        async function processFastMd5(file) {
            const blockSize = 4096;
            ensureWasmMemory();

            const ctxPtr = wasm._malloc(256);
            const dataPtr = wasm._malloc(blockSize);
            const digestPtr = wasm._malloc(16);

            try {
                wasm._MD5_Init_Ex(ctxPtr);
                const slices = [];
                if (file.size <= blockSize * 3) {
                    slices.push(file);
                } else {
                    slices.push(file.slice(0, blockSize)); // 头
                    slices.push(file.slice(Math.floor((file.size - blockSize)/2), Math.floor((file.size - blockSize)/2) + blockSize)); // 中
                    slices.push(file.slice(file.size - blockSize, file.size)); // 尾
                }

                for (let s of slices) {
                    const buf = await s.arrayBuffer();
                    const uint8 = new Uint8Array(buf);
                    ensureWasmMemory();
                    wasm.HEAPU8.set(uint8, dataPtr);
                    wasm._MD5_Update_Ex(ctxPtr, dataPtr, uint8.length);
                }

                wasm._MD5_Final_Ex(digestPtr, ctxPtr);
                const digest = new Uint8Array(wasm.HEAPU8.buffer, digestPtr, 16);
                return Array.from(digest).map(b => b.toString(16).padStart(2, '0')).join('');
            } finally {
                wasm._free(ctxPtr);
                wasm._free(dataPtr);
                wasm._free(digestPtr);
            }
        }

        // BLAKE3 并行计算核心逻辑
        async function processBlake3Parallel(file) {
            const threadCount = 4; // 线程数（通常可根据 CPU 核心数调整）
            const segmentSize = 8 * 1024 * 1024; // 每个 Worker 处理 8MB 块
            const workers = [];
            const results = [];
            
            log(`BLAKE3 并行加速: 开启 ${threadCount} 个计算核心...`);

            // 1. 初始化 Worker 池
            for (let i = 0; i < threadCount; i++) {
                workers[i] = new Worker('/static/worker.js');
            }

            const totalChunks = Math.ceil(file.size / segmentSize);
            let activeWorkers = 0;
            let currentChunk = 0;

            const cvList = new Array(totalChunks);

            const workerDone = new Promise((resolve) => {
                const checkDone = (id, cv) => {
                    cvList[id] = cv;
                    activeWorkers--;
                    if (currentChunk < totalChunks) {
                        dispatch(activeWorkers);
                    } else if (activeWorkers === 0) {
                        resolve();
                    }
                };

                const dispatch = () => {
                    while (activeWorkers < threadCount && currentChunk < totalChunks) {
                        const id = currentChunk++;
                        const start = id * segmentSize;
                        const end = Math.min(start + segmentSize, file.size);
                        const slice = file.slice(start, end);
                        
                        const workerIdx = activeWorkers++;
                        const worker = workers[workerIdx];
                        
                        worker.onmessage = (e) => checkDone(e.data.id, e.data.cv);
                        
                        slice.arrayBuffer().then(buf => {
                            worker.postMessage({ id, chunk: buf }, [buf]);
                        });
                    }
                };
                dispatch();
            });

            await workerDone;
            workers.forEach(w => w.terminate());

            // 2. 在主线程进行 Merkle Tree 合并 (使用 Compress_Parent)
            ensureWasmMemory();
            const leftPtr = wasm._malloc(32);
            const rightPtr = wasm._malloc(32);
            const resPtr = wasm._malloc(32);
            const keyPtr = wasm._malloc(32); // 默认 Key
            
            // 初始化默认 Key 为 IV
            const iv = [0x6A09E667, 0xBB67AE85, 0x3C6EF372, 0xA54FF53A, 0x510E527F, 0x9B05688C, 0x1F83D9AB, 0x5BE0CD19];
            wasm.HEAPU32.set(iv, keyPtr >> 2);

            let currentLevel = cvList;
            while (currentLevel.length > 1) {
                const nextLevel = [];
                for (let i = 0; i < currentLevel.length; i += 2) {
                    if (i + 1 < currentLevel.length) {
                        // 合并两个节点
                        wasm.HEAPU32.set(currentLevel[i], leftPtr >> 2);
                        wasm.HEAPU32.set(currentLevel[i+1], rightPtr >> 2);
                        
                        // 调用我们新写的 C 函数，flags=0x08 (ROOT) 如果是最后一层
                        const isRoot = currentLevel.length <= 2 ? 0x08 : 0x00;
                        wasm._BLAKE3_Compress_Parent_Ex(resPtr, leftPtr, rightPtr, keyPtr, isRoot);
                        
                        nextLevel.push(new Uint32Array(wasm.HEAPU8.buffer, resPtr, 8).slice());
                    } else {
                        // 孤立节点直接晋级
                        nextLevel.push(currentLevel[i]);
                    }
                }
                currentLevel = nextLevel;
            }

            wasm._free(leftPtr);
            wasm._free(rightPtr);
            wasm._free(resPtr);
            wasm._free(keyPtr);

            return Array.from(new Uint8Array(currentLevel[0].buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('calcBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('请选择文件');

            log(`开始全量计算: ${file.name}`);
            
            // MD5
            let t0 = performance.now();
            resMd5.textContent = '计算中...';
            resMd5.textContent = await processFileStream(file, 'MD5');
            document.getElementById('time-md5').textContent = `${(performance.now() - t0).toFixed(2)} ms`;

            // SHA256
            t0 = performance.now();
            resSha256.textContent = '计算中...';
            resSha256.textContent = await processFileStream(file, 'SHA256');
            document.getElementById('time-sha256').textContent = `${(performance.now() - t0).toFixed(2)} ms`;

            // BLAKE3 并行版
            t0 = performance.now();
            resBlake3.textContent = '并行计算中...';
            resBlake3.textContent = await processBlake3Parallel(file);
            document.getElementById('time-blake3').textContent = `${(performance.now() - t0).toFixed(2)} ms`;
            
            log('全量计算完成。');
        };

        document.getElementById('fastCalcBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('请选择文件');

            log(`开始快速哈希: ${file.name}`);
            let t0 = performance.now();
            const fast = await processFastMd5(file);
            resFastMd5.textContent = fast;
            document.getElementById('time-fast-md5').textContent = `${(performance.now() - t0).toFixed(2)} ms`;
            log('快速哈希计算完成。');
        };
    </script>
</body>
</html>
